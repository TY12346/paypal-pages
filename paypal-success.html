<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Approved</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }

    h1 {
      color: #2e7d32;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Payment Approved</h1>
    <p>Returning to app...</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";

    const deepLink =
      "myapp://payment-success?orderId=" + encodeURIComponent(token);

    // 🚀 AUTO redirect
    window.location.href = deepLink;

    // fallback (important)
    setTimeout(() => {
      window.location.href = deepLink;
    }, 1000);
  </script>
</body>
</html>
