<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Approved</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      color: #2e7d32;
      margin-bottom: 12px;
    }

    p {
      color: #444;
      line-height: 1.5;
    }

    .info {
      margin-top: 16px;
      padding: 12px;
      background: #f2f2f2;
      border-radius: 8px;
      font-size: 14px;
      word-break: break-word;
    }

    button {
      margin-top: 20px;
      background: #2e7d32;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Payment Approved</h1>
    <p>Your PayPal sandbox payment was approved successfully.</p>
    <p>Return to the app and tap <strong>Confirm Payment</strong>.</p>

    <div class="info" id="infoBox"></div>

    <button onclick="goBack()">Back to App</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";
    const payerId = params.get("PayerID") || "";

    const infoBox = document.getElementById("infoBox");
    infoBox.innerHTML = `
      <strong>PayPal Order Token:</strong><br>${token || "N/A"}<br><br>
      <strong>Payer ID:</strong><br>${payerId || "N/A"}
    `;

    function goBack() {
      window.close();
    }
  </script>
</body>
</html>
