<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f6f6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      color: #c62828;
      margin-bottom: 12px;
    }

    p {
      color: #444;
      line-height: 1.5;
    }

    button {
      margin-top: 20px;
      background: #757575;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Payment Cancelled</h1>
    <p>You cancelled the PayPal sandbox payment.</p>
    <p>Tap below to return to the app.</p>

    <button onclick="goBackToApp()">Back to App</button>
  </div>

  <script>
    function goBackToApp() {
      window.location.href = "myapp://payment-cancel";
    }
  </script>
</body>
</html>
